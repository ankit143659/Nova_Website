
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA AI - The Ultimate Personal Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            colors: {
              primary: '#ffffff',
              secondary: '#a1a1aa',
              surface: '#09090b',
              'surface-lighter': '#18181b',
              'text-primary': '#ffffff',
              'text-secondary': '#a1a1aa',
            },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --primary-theme: #ffffff;
      }

      body {
        background-color: #000000;
        color: white;
        overflow-x: hidden;
        margin: 0;
        font-family: 'Inter', sans-serif;
      }

      /* Clean Atmospheric Background */
      .quantum-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background: #050010;
        overflow: hidden;
      }

      .mesh-gradient {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background-image: 
          radial-gradient(circle at 15% 50%, rgba(120, 0, 255, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 85% 30%, rgba(255, 0, 128, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 50% 100%, rgba(0, 255, 204, 0.05) 0%, transparent 50%);
        filter: blur(60px);
        animation: pulse-slow 8s infinite alternate;
      }

      .noise-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.03;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { 
        background: rgba(255,255,255,0.1);
        border-radius: 10px; 
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255,255,255,0.2);
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>

    <!-- Multi-Layered Premium Background -->
    <div class="quantum-bg">
      <div class="mesh-gradient"></div>
      <div class="noise-overlay"></div>
    </div>

<script type="module" src="/index.tsx"></script>
</body>
</html>


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA AI - The Ultimate Personal Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              orbitron: ['Orbitron', 'sans-serif'],
              exo: ['Exo', 'sans-serif'],
            },
            colors: {
              primary: '#00f2ff',
              secondary: '#7000ff',
              accent: '#ff00d4',
              surface: '#0a0a12',
              'surface-lighter': '#151525',
              'text-primary': '#ffffff',
              'text-secondary': '#a0a0c0',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --primary-theme: #00f2ff;
        --secondary-theme: #7000ff;
        --accent-theme: #ff00d4;
      }

      body {
        background-color: #020205;
        color: white;
        overflow-x: hidden;
        margin: 0;
      }

      /* Premium Quantum Background Engine */
      .quantum-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background: #020205;
        overflow: hidden;
      }

      /* Animated Mesh Gradient */
      .mesh-gradient {
        position: absolute;
        width: 200%;
        height: 200%;
        top: -50%;
        left: -50%;
        background-image: 
          radial-gradient(circle at 30% 30%, rgba(0, 242, 255, 0.15) 0%, transparent 40%),
          radial-gradient(circle at 70% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
          radial-gradient(circle at 40% 80%, rgba(255, 0, 212, 0.1) 0%, transparent 40%),
          radial-gradient(circle at 80% 80%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
        filter: blur(80px);
        animation: mesh-drift 30s infinite alternate ease-in-out;
      }

      @keyframes mesh-drift {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(5deg) scale(1.1); }
        100% { transform: rotate(-5deg) scale(1); }
      }

      /* Cyber Grid with Perspective */
      .cyber-grid {
        position: absolute;
        width: 100%;
        height: 100%;
        background-image: 
          linear-gradient(to right, rgba(0, 242, 255, 0.05) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
        background-size: 50px 50px;
        mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
      }

      /* High-End Grain/Noise Texture for Premium Feel */
      .noise-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        opacity: 0.04;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* Floating Energy Particles */
      .particles-container {
        position: absolute;
        width: 100%;
        height: 100%;
      }

      .particle {
        position: absolute;
        background: white;
        border-radius: 50%;
        opacity: 0.2;
        filter: blur(1px);
        animation: particle-rise linear infinite;
      }

      @keyframes particle-rise {
        from { transform: translateY(110vh); }
        to { transform: translateY(-10vh); }
      }

      /* UI Card Enhancements */
      .glass-card {
        background: rgba(10, 10, 18, 0.4);
        backdrop-filter: blur(20px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
      }

      .glass-card:hover {
        background: rgba(20, 20, 30, 0.6);
        border-color: var(--primary-theme);
        box-shadow: 0 0 30px rgba(0, 242, 255, 0.15), 0 20px 50px rgba(0,0,0,0.5);
        transform: translateY(-10px) scale(1.02);
      }

      /* Custom Scrollbar Theme Sync */
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
      .custom-scrollbar::-webkit-scrollbar-thumb { 
        background: linear-gradient(to bottom, var(--primary-theme), var(--secondary-theme));
        border-radius: 10px; 
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>

    <!-- Multi-Layered Premium Background -->
    <div class="quantum-bg">
      <div class="mesh-gradient"></div>
      <div class="cyber-grid"></div>
      <div class="particles-container" id="particles"></div>
      <div class="noise-overlay"></div>
    </div>

    <script>
      // Dynamic Particle Generation
      const container = document.getElementById('particles');
      const count = 30;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 2 + 1;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (Math.random() * 10 + 10) + 's';
        p.style.animationDelay = (Math.random() * 20) + 's';
        p.style.opacity = Math.random() * 0.3;
        container.appendChild(p);
      }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
